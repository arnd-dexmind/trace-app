name: CI

on:
  push:
    branches:
      - master
      - main
      - staging
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: perifeye_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/perifeye_test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install client dependencies
        run: npm run client:install

      - name: Apply migrations
        run: npx prisma migrate deploy

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

  frontend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: perifeye_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/perifeye_test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install client dependencies
        run: npm run client:install

      - name: Apply migrations
        run: npx prisma migrate deploy

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Frontend smoke tests
        run: npm run test:frontend

  # Workflow model:
  #   PR → preview deploy with Marketplace-managed per-PR Neon branch
  #   merge to staging → deploy-staging job → resets preview/staging Neon branch
  #     from main, deploys to staging.app.perifeye.com
  #   release PR (staging → main) → deploy-production job → deploys to
  #     app.perifeye.com (Vercel build runs migrations against production main)

  deploy-staging:
    needs: [quality, frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Reset the staging Neon branch from its parent (production main) so each
      # staging push tests migrations against the *current* production schema/data.
      # Marketplace may create either `staging` (matches the git branch) or
      # `preview/staging` (its standard preview-branch convention), so look for
      # both. Vercel's buildCommand runs `prisma migrate deploy` against the
      # freshly-reset branch.
      - name: Reset staging Neon branch from main
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
        run: |
          set -e
          BRANCH_ID=$(curl -fsSL \
            "https://console.neon.tech/api/v2/projects/${NEON_PROJECT_ID}/branches" \
            -H "Authorization: Bearer ${NEON_API_KEY}" \
            | python3 -c "
          import json,sys,re
          raw=re.sub(r'[\x00-\x08\x0b-\x1f]', '', sys.stdin.read())
          for name in ('preview/staging', 'staging'):
              for b in json.loads(raw)['branches']:
                  if b['name'] == name:
                      print(b['id'])
                      sys.exit(0)
          ")
          if [ -z "$BRANCH_ID" ]; then
            echo "::warning::No staging or preview/staging Neon branch found yet (Marketplace creates it on first deploy). Skipping reset."
            exit 0
          fi
          echo "Resetting staging branch ($BRANCH_ID) from parent..."
          curl -fsSL -X POST \
            "https://console.neon.tech/api/v2/projects/${NEON_PROJECT_ID}/branches/${BRANCH_ID}/reset_to_parent" \
            -H "Authorization: Bearer ${NEON_API_KEY}" \
            -H "Content-Type: application/json" > /dev/null
          for i in $(seq 1 30); do
            state=$(curl -fsSL \
              "https://console.neon.tech/api/v2/projects/${NEON_PROJECT_ID}/branches/${BRANCH_ID}" \
              -H "Authorization: Bearer ${NEON_API_KEY}" \
              | python3 -c "import json,sys,re; print(json.loads(re.sub(r'[\x00-\x08\x0b-\x1f]','',sys.stdin.read()))['branch']['current_state'])")
            echo "  attempt $i: state=$state"
            [ "$state" = "ready" ] && { echo "✓ Reset complete"; exit 0; }
            sleep 2
          done
          echo "::error::preview/staging branch reset did not complete within 60s"
          exit 1

      - name: Deploy to Vercel (staging)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        # No --prod: deploys as Preview, auto-aliased to staging.app.perifeye.com
        # (Vercel domain bound to gitBranch=staging in the trace-app project).
        run: |
          mkdir -p apps/app
          for item in * .[!.]*; do
            case "$item" in .|..|apps|.git|node_modules) continue ;; esac
            [ -e "$item" ] || continue
            cp -al "$item" apps/app/
          done
          npx vercel@latest deploy --token "$VERCEL_TOKEN" --yes

      - name: Smoke test
        env:
          BYPASS: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: |
          sleep 5
          # staging.app.perifeye.com is preview-aliased so it sits behind Vercel's
          # SSO Deployment Protection — pass the bypass token via header.
          curl -f -s -o /dev/null -H "x-vercel-protection-bypass: $BYPASS" \
            ${{ secrets.STAGING_URL }}/api/health || \
            (sleep 10 && curl -f -s -o /dev/null \
              -H "x-vercel-protection-bypass: $BYPASS" \
              ${{ secrets.STAGING_URL }}/api/health)

  deploy-production:
    needs: [quality]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Migrations run as part of Vercel's buildCommand against production main
      # Neon branch (Marketplace-injected DATABASE_URL_UNPOOLED).

      - name: Deploy to Vercel (production)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          mkdir -p apps/app
          for item in * .[!.]*; do
            case "$item" in .|..|apps|.git|node_modules) continue ;; esac
            [ -e "$item" ] || continue
            cp -al "$item" apps/app/
          done
          npx vercel@latest deploy --prod --token "$VERCEL_TOKEN" --yes

      - name: Smoke test
        run: |
          sleep 5
          curl -f -s -o /dev/null ${{ secrets.PRODUCTION_URL }}/api/health || \
            (sleep 10 && curl -f -s -o /dev/null ${{ secrets.PRODUCTION_URL }}/api/health)
