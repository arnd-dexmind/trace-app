name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: perifeye_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/perifeye_test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install client dependencies
        run: npm run client:install

      - name: Apply migrations
        run: npx prisma migrate deploy

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

  frontend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: perifeye_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/perifeye_test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install client dependencies
        run: npm run client:install

      - name: Apply migrations
        run: npx prisma migrate deploy

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Frontend smoke tests
        run: npm run test:frontend

  deploy-staging:
    needs: [quality, frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Reset the long-lived staging Neon branch from its parent (main) so each
      # main push tests migrations against the *current* production schema/data.
      # The branch endpoint stays stable; only the data is replaced.
      # Vercel's buildCommand then runs `prisma migrate deploy` against this
      # freshly-reset branch.
      - name: Reset staging Neon branch from main
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
          NEON_STAGING_BRANCH_ID: ${{ secrets.NEON_STAGING_BRANCH_ID }}
        run: |
          set -e
          echo "Resetting staging branch from parent..."
          curl -fsSL -X POST \
            "https://console.neon.tech/api/v2/projects/${NEON_PROJECT_ID}/branches/${NEON_STAGING_BRANCH_ID}/reset_to_parent" \
            -H "Authorization: Bearer ${NEON_API_KEY}" \
            -H "Content-Type: application/json" > /dev/null
          for i in $(seq 1 30); do
            state=$(curl -fsSL \
              "https://console.neon.tech/api/v2/projects/${NEON_PROJECT_ID}/branches/${NEON_STAGING_BRANCH_ID}" \
              -H "Authorization: Bearer ${NEON_API_KEY}" \
              | python3 -c "import json,sys; print(json.load(sys.stdin)['branch']['current_state'])")
            echo "  attempt $i: state=$state"
            [ "$state" = "ready" ] && { echo "✓ Reset complete"; exit 0; }
            sleep 2
          done
          echo "::error::Staging branch reset did not complete within 60s"
          exit 1

      - name: Deploy to Vercel (staging)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        # No --prod: main is no longer the production branch (productionBranch=release).
        # This deploys as a Preview, which Vercel auto-aliases to staging.app.perifeye.com
        # (the domain bound to gitBranch=main in the trace-app project).
        run: npx vercel@latest deploy --token "$VERCEL_TOKEN" --yes

      - name: Smoke test
        run: |
          sleep 5
          curl -f -s -o /dev/null ${{ secrets.STAGING_URL }}/api/health || \
            (sleep 10 && curl -f -s -o /dev/null ${{ secrets.STAGING_URL }}/api/health)

  deploy-production:
    needs: [quality, frontend]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Migrations now run as part of Vercel's buildCommand (see vercel.json),
      # using DATABASE_URL_UNPOOLED for the direct connection. CI no longer
      # needs to migrate first — Vercel build is the single source of truth.

      - name: Deploy to Vercel (production)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: npx vercel@latest deploy --prod --token "$VERCEL_TOKEN" --yes

      - name: Smoke test
        run: |
          sleep 5
          curl -f -s -o /dev/null ${{ secrets.PRODUCTION_URL }}/api/health || \
            (sleep 10 && curl -f -s -o /dev/null ${{ secrets.PRODUCTION_URL }}/api/health)
